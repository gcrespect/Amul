name: Amul Lassi Stock Checker

on:
  schedule:
    - cron: '0 * * * *'   # Every 1 hour (saves your free API quota)
  workflow_dispatch:

jobs:
  check-stock:
    runs-on: ubuntu-latest
    steps:
      - name: Check stock and notify via Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
        run: |
          python3 - <<'EOF'
          import urllib.request
          import json
          import os

          PRODUCT_URL = "https://shop.amul.com/en/product/amul-high-protein-plain-lassi-200-ml-or-pack-of-30"
          PRODUCT_NAME = "Amul High Protein Plain Lassi (200 mL | Pack of 30)"
          webhook = os.environ["DISCORD_WEBHOOK_URL"]
          scraper_key = os.environ["SCRAPER_API_KEY"]

          # Route through ScraperAPI to bypass bot detection
          proxy_url = f"http://scraperapi:{scraper_key}@proxy-server.scraperapi.com:8001"
          proxy_handler = urllib.request.ProxyHandler({"http": proxy_url, "https": proxy_url})
          opener = urllib.request.build_opener(proxy_handler)

          req = urllib.request.Request(PRODUCT_URL)
          response = opener.open(req)
          html = response.read().decode("utf-8", errors="ignore")

          is_sold_out = "Sold Out" in html or "Notify Me" in html

          if not is_sold_out:
              message = {
                  "content": (
                      "🟢 **IN STOCK NOW!**\n"
                      f"**{PRODUCT_NAME}** is available on Amul Shop!\n"
                      f"👉 Buy here: {PRODUCT_URL}"
                  )
              }
              data = json.dumps(message).encode("utf-8")
              notify_req = urllib.request.Request(
                  webhook, data=data,
                  headers={"Content-Type": "application/json"}
              )
              urllib.request.urlopen(notify_req)
              print("✅ IN STOCK! Discord notification sent.")
          else:
              print("❌ Still sold out. No notification sent.")
          EOF
