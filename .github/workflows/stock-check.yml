name: Amul Lassi Stock Checker

on:
  schedule:
    - cron: '*/10 * * * *'  # Every 10 minutes
  workflow_dispatch:

jobs:
  check-stock:
    runs-on: ubuntu-latest
    steps:
      - name: Check stock and notify via Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python3 - <<'EOF'
          import urllib.request
          import json
          import os

          PRODUCT_URL = "https://shop.amul.com/en/product/amul-high-protein-plain-lassi-200-ml-or-pack-of-30"
          PRODUCT_NAME = "Amul High Protein Plain Lassi (200 mL | Pack of 30)"
          webhook = os.environ["DISCORD_WEBHOOK_URL"]

          req = urllib.request.Request(
              PRODUCT_URL,
              headers={"User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"}
          )
          html = urllib.request.urlopen(req).read().decode("utf-8")

          # When OUT of stock, the HTML contains "Sold Out" and "Notify Me"
          # When IN stock, neither appears — only "Add" is present
          is_sold_out = "Sold Out" in html or "Notify Me" in html

          if not is_sold_out:
              message = {
                  "content": (
                      "🟢 **IN STOCK NOW!**\n"
                      f"**{PRODUCT_NAME}** is available on Amul Shop!\n"
                      f"👉 Buy here: {PRODUCT_URL}"
                  )
              }
              data = json.dumps(message).encode("utf-8")
              notify_req = urllib.request.Request(
                  webhook, data=data,
                  headers={"Content-Type": "application/json"}
              )
              urllib.request.urlopen(notify_req)
              print("✅ IN STOCK! Discord notification sent.")
          else:
              print("❌ Still sold out. No notification sent.")
          EOF
