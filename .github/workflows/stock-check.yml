name: Amul Lassi Stock Checker

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  check-stock:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: |
          pip install playwright requests --break-system-packages
          playwright install chromium --with-deps

      - name: Check stock and notify via Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          cat > check_stock.py << 'PYEOF'
          import os
          import requests
          from playwright.sync_api import sync_playwright

          PRODUCT_URL = "https://shop.amul.com/en/product/amul-high-protein-plain-lassi-200-ml-or-pack-of-30"
          PRODUCT_NAME = "Amul High Protein Plain Lassi (200 mL | Pack of 30)"
          PINCODE = "201310"
          webhook = os.environ.get("DISCORD_WEBHOOK_URL", "")

          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True)
              context = browser.new_context(
                  user_agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36"
              )
              page = context.new_page()

              page.goto("https://shop.amul.com/en/browse/protein", wait_until="networkidle", timeout=30000)

              try:
                  page.click(".pincode_wrap", timeout=5000)
                  page.wait_for_timeout(1000)
                  pincode_input = page.locator("input[placeholder='Enter Your Pincode']")
                  pincode_input.click()
                  pincode_input.clear()
                  for char in PINCODE:
                      page.keyboard.type(char)
                      page.wait_for_timeout(200)
                  page.wait_for_timeout(2000)
                  page.click("a.searchitem-name", timeout=5000)
                  print("Clicked dropdown suggestion")
                  page.wait_for_timeout(3000)
              except Exception as e:
                  print(f"Pincode error: {e}")

              page.goto(PRODUCT_URL, wait_until="networkidle", timeout=30000)
              page.screenshot(path="product_page.png", full_page=True)
              html = page.content()

              # Print relevant snippets from HTML
              for kw in ["Sold Out", "Notify Me", "sold_out", "notify", "Add", "stock"]:
                  idx = html.find(kw)
                  if idx != -1:
                      print(f"\nFound '{kw}':")
                      print(html[max(0, idx-150):idx+150])
                      print("---")

              browser.close()

          is_sold_out = "Sold Out" in html or "Notify Me" in html
          print(f"\nIs sold out: {is_sold_out}")
          PYEOF
          python3 check_stock.py

      - name: Upload screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: product-page-screenshot
          path: product_page.png
