name: Amul Lassi Stock Checker

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  check-stock:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: |
          pip install playwright requests --break-system-packages
          playwright install chromium --with-deps

      - name: Check stock and notify via Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          cat > check_stock.py << 'PYEOF'
          import os
          import requests
          from playwright.sync_api import sync_playwright

          PRODUCT_URL = "https://shop.amul.com/en/product/amul-high-protein-plain-lassi-200-ml-or-pack-of-30"
          PRODUCT_NAME = "Amul High Protein Plain Lassi (200 mL | Pack of 30)"
          PINCODE = "201310"
          webhook = os.environ.get("DISCORD_WEBHOOK_URL", "")

          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True)
              context = browser.new_context(
                  user_agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36"
              )
              page = context.new_page()

              page.goto(PRODUCT_URL, wait_until="networkidle", timeout=30000)

              try:
                  # Modal is already open - click directly into the input
                  pincode_input = page.locator("input#search")
                  pincode_input.wait_for(state="visible", timeout=5000)
                  pincode_input.click()
                  for char in PINCODE:
                      page.keyboard.type(char)
                      page.wait_for_timeout(200)
                  print(f"Typed pincode: {PINCODE}")
                  page.wait_for_timeout(2000)
                  page.screenshot(path="2_typed.png", full_page=True)

                  # Click dropdown result
                  page.click("a.searchitem-name", timeout=5000)
                  print("Clicked dropdown")
                  page.wait_for_timeout(4000)
                  page.screenshot(path="3_done.png", full_page=True)

              except Exception as e:
                  print(f"Pincode error: {e}")
                  page.screenshot(path="error.png", full_page=True)

              html = page.content()
              browser.close()

          is_sold_out = "Sold Out" in html or "Notify Me" in html
          print(f"Is sold out: {is_sold_out}")

          if not is_sold_out:
              message = {
                  "content": (
                      "🟢 **IN STOCK NOW!**\n"
                      f"**{PRODUCT_NAME}** is available on Amul Shop!\n"
                      f"👉 Buy here: {PRODUCT_URL}"
                  )
              }
              response = requests.post(webhook, json=message)
              if response.status_code == 204:
                  print("✅ IN STOCK! Discord notification sent.")
              else:
                  print(f"❌ Discord error: {response.status_code} {response.text}")
          else:
              print("❌ Still sold out. No notification sent.")
          PYEOF
          python3 check_stock.py

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: "*.png"
