name: Amul Lassi Stock Checker

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  check-stock:
    runs-on: ubuntu-latest
    steps:
      - name: Check stock and notify via Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python3 - <<'EOF'
          import urllib.request
          import json
          import os
          import gzip

          PRODUCT_URL = "https://shop.amul.com/en/product/amul-high-protein-plain-lassi-200-ml-or-pack-of-30"
          PRODUCT_NAME = "Amul High Protein Plain Lassi (200 mL | Pack of 30)"
          webhook = os.environ["DISCORD_WEBHOOK_URL"]

          headers = {
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36",
              "Accept": "text/html,application/xhtml+xml,application/xml;q=0.9,image/webp,*/*;q=0.8",
              "Accept-Language": "en-US,en;q=0.9",
              "Accept-Encoding": "gzip, deflate",
              "Connection": "keep-alive",
              "Upgrade-Insecure-Requests": "1",
              "Cache-Control": "max-age=0",
              "Referer": "https://shop.amul.com/en/browse/protein"
          }

          req = urllib.request.Request(PRODUCT_URL, headers=headers)
          response = urllib.request.urlopen(req)
          raw = response.read()

          # Handle gzip compressed response
          if response.info().get("Content-Encoding") == "gzip":
              html = gzip.decompress(raw).decode("utf-8", errors="ignore")
          else:
              html = raw.decode("utf-8", errors="ignore")

          is_sold_out = "Sold Out" in html or "Notify Me" in html

          if not is_sold_out:
              message = {
                  "content": (
                      "🟢 **IN STOCK NOW!**\n"
                      f"**{PRODUCT_NAME}** is available on Amul Shop!\n"
                      f"👉 Buy here: {PRODUCT_URL}"
                  )
              }
              data = json.dumps(message).encode("utf-8")
              notify_req = urllib.request.Request(
                  webhook, data=data,
                  headers={"Content-Type": "application/json"}
              )
              urllib.request.urlopen(notify_req)
              print("✅ IN STOCK! Discord notification sent.")
          else:
              print("❌ Still sold out. No notification sent.")
          EOF
