name: Amul Lassi Stock Checker

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  check-stock:
    runs-on: ubuntu-latest
    steps:
      - name: Install Playwright
        run: |
          pip install playwright --break-system-packages
          playwright install chromium --with-deps

      - name: Check stock and notify via Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python3 - <<'EOF'
          import json
          import os
          from playwright.sync_api import sync_playwright

          PRODUCT_URL = "https://shop.amul.com/en/product/amul-high-protein-plain-lassi-200-ml-or-pack-of-30"
          webhook = os.environ.get("DISCORD_WEBHOOK_URL", "")

          # Debug: check if secret is loaded
          if not webhook:
              print("❌ ERROR: DISCORD_WEBHOOK_URL secret is empty or not set!")
          else:
              print(f"✅ Webhook URL loaded, starts with: {webhook[:40]}...")

          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True)
              context = browser.new_context(
                  user_agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36"
              )
              page = context.new_page()
              page.goto(PRODUCT_URL, wait_until="networkidle", timeout=30000)
              html = page.content()
              browser.close()

          is_sold_out = "Sold Out" in html or "Notify Me" in html
          print(f"Is sold out: {is_sold_out}")
          print(f"Page loaded, length: {len(html)} characters")
          EOF
